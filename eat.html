<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宝宝今天吃点啥</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    .body {
      margin: 0;
      padding: 0;
      display: grid;
      min-height: 100vh;
      place-items: center;
      background-image: url("http://tbvrmfkru.hn-bkt.clouddn.com/background.png");
      background-repeat: no-repeat;
      background-position: center center;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: transparent;
      padding: 60px 80px;
      border-radius: 30px;
    }
    
    .title {
      font-size: 3.5rem;
      background: linear-gradient(45deg, #ff6b6b, #feca57);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 40px 0;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .food {
      font-size: 4rem;
      color: #ff6b6b;
      margin: 25px 0 35px 0;
      text-align: center;
      font-weight: bold;
      transition: all 0.3s ease;
      text-shadow: 2px 2px 4px rgba(255, 107, 107, 0.3);
    }
    
    .food:hover {
      transform: scale(1.05);
    }
    
    .button {
      background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
      color: white;
      border: none;
      padding: 18px 60px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1.4rem;
      margin-top: 15px;
      border-radius: 50px;
      box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
      transition: all 0.3s ease;
    }
    
    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(255, 107, 107, 0.6);
    }
    
    .button:active {
      transform: translateY(0);
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body class="body">
  <div class="container">
    <p class="title">今天吃点:</p>
    <div class="food" id="foodResult">等待抽取...</div>
    <button class="button" id="button">一键抽取</button>
  </div>
  <script>
    const foodList = [
      "铁板饭","掉渣饼","老麻抄手","煎饼","鱼粉","面行人","朱家小馆",
      "肠粉","饺子","普通饭","小锅猪肚鸡","外公家米线","重庆小面",
      "外婆家拌饭","铁锅焖面","曹氏鸭脖","螺蛳粉","冒菜","轻食","米言牛肉饭"
    ];
    
    const foodResult = document.querySelector('#foodResult');
    const button = document.querySelector('#button');
    
    button.addEventListener('click', function() {

      foodResult.style.transform = 'scale(0.8)';
      foodResult.style.opacity = '0.5';
      
      setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * foodList.length);
        foodResult.innerText = foodList[randomIndex];
        foodResult.style.transform = 'scale(1)';
        foodResult.style.opacity = '1';
      }, 150);
    });
  </script>
</body>
</html>
