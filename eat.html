<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>宝宝今天吃点啥</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      margin: 0;
      padding: 0;
      display: grid;
      min-height: 100vh;
      place-items: center;
      background-image: url("background.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      overflow-x: hidden;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
      border-radius: 30px;
      max-width: 600px;
      width: 90%;
    }
    
    .title {
      font-size: 3.5rem;
      background: linear-gradient(45deg, #ff6b6b, #feca57);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 40px 0;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      text-align: center;
      line-height: 1.2;
    }

    .food {
      font-size: 4rem;
      color: #ff6b6b;
      margin: 25px 0 35px 0;
      text-align: center;
      font-weight: bold;
      transition: all 0.3s ease;
      text-shadow: 2px 2px 4px rgba(255, 107, 107, 0.3);
      word-break: break-all;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .food:hover {
      transform: scale(1.05);
    }
    
    .button {
      background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
      color: white;
      border: none;
      padding: 18px 60px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1.4rem;
      margin-top: 15px;
      border-radius: 50px;
      box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
      transition: all 0.3s ease;
      max-width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    
    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(255, 107, 107, 0.6);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .icon {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    /* ========== 移动端适配 ========== */
    
    /* 平板及中等屏幕 (768px及以下) */
    @media screen and (max-width: 768px) {
      .container {
        padding: 40px 30px;
        width: 85%;
      }
      
      .title {
        font-size: 2.2rem;
        margin: 0 0 25px 0;
      }
      
      .food {
        font-size: 2.8rem;
        margin: 20px 0 25px 0;
        min-height: 60px;
      }
      
      .button {
        padding: 15px 45px;
        font-size: 1.2rem;
      }
    }

    /* 小屏手机 (480px及以下) */
    @media screen and (max-width: 480px) {
      .container {
        padding: 25px 20px;
        width: 85%;
        border-radius: 20px;
      }
      
      .title {
        font-size: 1.8rem;
        margin: 0 0 20px 0;
      }
      
      .food {
        font-size: 2rem;
        margin: 15px 0 20px 0;
        min-height: 50px;
      }
      
      .button {
        padding: 14px 35px;
        font-size: 1.1rem;
        width: 100%;
      }
    }

    /* 超小屏幕 (360px及以下) */
    @media screen and (max-width: 360px) {
      .container {
        padding: 20px 15px;
        width: 90%;
      }
      
      .title {
        font-size: 1.5rem;
      }
      
      .food {
        font-size: 1.6rem;
      }
      
      .button {
        padding: 12px 25px;
        font-size: 1rem;
      }
    }

    /* 横屏适配 */
    @media screen and (max-height: 500px) and (orientation: landscape) {
      .container {
        padding: 20px 40px;
        flex-direction: row;
        flex-wrap: wrap;
      }
      
      .title {
        font-size: 1.5rem;
        margin: 0 20px 0 0;
      }
      
      .food {
        font-size: 1.8rem;
        margin: 0 20px;
        min-height: auto;
      }
      
      .button {
        padding: 10px 25px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="title">今天吃点:</p>
    <div class="food" id="foodResult">等待抽取...</div>
    <button class="button" id="button">一键抽取</button>
  </div>
  <script>
    const foodList = [
      "铁板饭","掉渣饼","老麻抄手","煎饼","鱼粉","面行人","朱家小馆",
      "肠粉","饺子","普通饭","小锅猪肚鸡","外公家米线","重庆小面",
      "外婆家拌饭","铁锅焖面","曹氏鸭脖","螺蛳粉","冒菜","轻食","米言牛肉饭"
    ];
    
    const foodResult = document.querySelector('#foodResult');
    const button = document.querySelector('#button');
    
    // 添加点击反馈动画
    button.addEventListener('click', function() {
      // 按钮点击效果
      this.style.transform = 'scale(0.95)';
      setTimeout(() => {
        this.style.transform = 'scale(1)';
      }, 150);

      // 食物文字动画
      foodResult.style.transform = 'scale(0.8)';
      foodResult.style.opacity = '0.5';
      
      setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * foodList.length);
        foodResult.innerText = foodList[randomIndex];
        foodResult.style.transform = 'scale(1)';
        foodResult.style.opacity = '1';
      }, 150);
    });

    // 防止双击缩放
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>
</body>
</html>
